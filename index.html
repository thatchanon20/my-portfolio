<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thatchanon W. | Software Engineer Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark-main: #0f1115;       /* สีพื้นหลังหลัก เทาเข้มเกือบดำ */
            --bg-card-dark: rgba(28, 31, 38, 0.85); /* พื้นหลังการ์ด เทาเข้มโปร่งแสง */
            --border-tech: rgba(148, 163, 184, 0.25); /* ขอบสีเทาเงินจางๆ */
            --tech-gray-light: #f1f5f9;   /* สีเทาขาวสว่าง */
            --tech-silver: #cbd5e1;       /* สีเทาเงินเมทัลลิก */
            --tech-slate: #64748b;        /* สีเทาหม่นสเลท */
            --tech-green-muted: #86efac;  /* สีเขียวพาสเทลสำหรับสถานะ */
            --text-light: #f8fafc;        
            --text-muted: #94a3b8;        
            --text-description: #e2e8f0;  
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-dark-main);
            color: var(--text-light);
            scroll-behavior: smooth;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Canvas Background Setup --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .code-font {
            font-family: 'JetBrains Mono', 'Sarabun', monospace;
        }

        .a4-container {
            width: 100%;
            max-width: 1140px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .navbar {
            background-color: rgba(15, 17, 21, 0.9) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-tech);
            padding: 15px 0;
            z-index: 1050;
        }
        .navbar-brand {
            font-family: 'JetBrains Mono', sans-serif;
            letter-spacing: 0.5px;
            font-size: 1.1rem;
            color: var(--text-light) !important;
        }
        .nav-link { 
            color: var(--text-muted) !important; 
            font-size: 0.9rem; 
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .nav-link:hover {
            color: var(--tech-gray-light) !important;
        }

        .profile-header-card {
            background: var(--bg-card-dark);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border-tech);
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .profile-banner {
            background: radial-gradient(circle at top right, rgba(47, 54, 66, 0.8), rgba(15, 17, 21, 0.9));
            padding: 50px 40px;
            border-bottom: 1px solid var(--border-tech);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        .profile-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 25px 25px;
            pointer-events: none;
        }

        .profile-banner h1 { 
            font-family: 'JetBrains Mono', sans-serif;
            font-size: 3.2rem; 
            font-weight: 700; 
            margin: 5px 0; 
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .profile-img-circle {
            width: 140px;
            height: 140px;
            border-radius: 12px;
            border: 2px solid var(--border-tech);
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* เอฟเฟกต์ Cursor กระพริบสำหรับตัวหนังสือขยับ */
        .typed-cursor {
            opacity: 1;
            animation: blink 0.7s infinite;
            color: var(--tech-silver);
            margin-left: 2px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .status-badge {
            background-color: rgba(134, 239, 172, 0.1);
            color: var(--tech-green-muted);
            border: 1px solid rgba(134, 239, 172, 0.25);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .status-dot {
            width: 6px; height: 6px; background-color: var(--tech-green-muted); border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; }
        }

        .section-title-box {
            font-family: 'JetBrains Mono', sans-serif;
            background-color: rgba(51, 65, 85, 0.8);
            color: var(--tech-silver);
            padding: 5px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid var(--border-tech);
            letter-spacing: 1px;
        }

        .readable-description {
            color: var(--text-description);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .info-label { font-weight: 600; color: var(--text-light); width: 100px; display: inline-block; font-size: 0.95rem; }
        .info-value { color: var(--text-light); font-size: 0.95rem; }

        .tech-timeline {
            position: relative;
            padding-left: 35px;
            margin-left: 15px;
            border-left: 2px solid var(--border-tech);
        }
        .timeline-item {
            position: relative;
            margin-bottom: 40px;
        }
        .timeline-item:last-child {
            margin-bottom: 10px;
        }
        .timeline-icon {
            position: absolute;
            left: -53px;
            top: 2px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #0f1115;
            border: 2px solid var(--tech-silver);
            color: var(--tech-silver);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            z-index: 2;
        }
        .timeline-year {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--tech-silver);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .timeline-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .timeline-subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .timeline-desc {
            color: var(--text-description);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 850px;
        }

        .skill-cat-card {
            background: var(--bg-card-dark);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-tech);
            border-radius: 10px;
            padding: 20px;
            height: 100%;
            transition: all 0.2s ease;
        }
        .skill-cat-card:hover {
            border-color: var(--tech-silver);
            transform: translateY(-2px);
        }
        .skill-cat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .skill-badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            background: rgba(15, 17, 21, 0.6);
            border: 1px solid var(--border-tech);
            color: var(--text-light);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .contact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .contact-item-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(51, 65, 85, 0.2);
            border-radius: 10px;
            border: 1px solid var(--border-tech);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }
        .contact-item-box:hover {
            background: rgba(51, 65, 85, 0.4);
            border-color: var(--tech-silver);
            color: var(--tech-gray-light) !important;
        }
        .contact-icon-circle {
            width: 32px; height: 32px; border-radius: 6px; background: rgba(51, 65, 85, 0.5); color: var(--text-light);
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0;
            border: 1px solid var(--border-tech);
        }

        .custom-card { 
            border: 1px solid var(--border-tech); 
            border-radius: 12px; 
            background: var(--bg-card-dark); 
            backdrop-filter: blur(10px);
            overflow: hidden; 
            height: 100%; 
            transition: all 0.3s ease;
        }
        .custom-card:hover {
            transform: translateY(-4px);
            border-color: var(--tech-silver);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .cert-img-wrapper { 
            height: 180px; 
            background-color: #0f1115; 
            border-bottom: 1px solid var(--border-tech); 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cert-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: cover; 
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease;
            filter: grayscale(20%);
        }
        .custom-card:hover .cert-img {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        .project-tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.08); 
            color: var(--tech-silver); 
            border: 1px solid var(--border-tech);
        }

        .project-tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 15px;
        }
        .tech-pill {
            font-size: 0.72rem;
            background: #0f1115;
            border: 1px solid var(--border-tech);
            color: var(--tech-silver);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ปรับปรุงกล่อง GPAX/Major เพื่อให้อ่านง่ายและชัดเจนขึ้น */
        .gpa-box {
            background: rgba(15, 17, 21, 0.85); /* เข้มขึ้นเพื่อตัดกับตัวหนังสือ */
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .contact-section-card {
            background: var(--bg-
